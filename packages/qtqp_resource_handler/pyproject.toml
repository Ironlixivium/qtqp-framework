[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "qtqp_resource_handler"
version = "0.1.0"
requires-python = ">=3.14"
dependencies = [
    "PySide6>=6.7",
    "platformdirs>=4.0",
    "qtqp_path @ file:///home/qplite/Projects/qtqp_path",
]

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests", "q_resources"]

[tool.black]
line-length = 120
target-version = ["py313"]

[tool.ruff]
line-length = 120
target-version = "py314"
lint.select = ["E","F","I","UP","B","C90"]
lint.ignore = []

[tool.pyright]
include = ["q_resources"]
pythonPath = ".venv/bin/python"
extraPaths = ["/home/qplite/Projects/qtqp_path"]
pythonPlatform = "Linux"
reportMissingImports = true
reportMissingModuleSource = true
typeCheckingMode = "strict"
