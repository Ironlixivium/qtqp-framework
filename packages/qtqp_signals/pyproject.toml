[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "q_signalkit"
version = "0.1.0"
requires-python = ">=3.14"
dependencies = []

[project.optional-dependencies]
qt  = ["PySide6-Essentials"]
dev = ["PySide6-Essentials", "pytest", "pyright", "ruff"]

[tool.pyright]
pythonVersion = "3.14"
typeCheckingMode = "strict"

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]
