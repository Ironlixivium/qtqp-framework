[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "q_signalkit"
version = "0.1.0"
requires-python = ">=3.14"
dependencies = []

[project.optional-dependencies]
qt  = ["PySide6-Essentials"]
dev = ["PySide6-Essentials", "pytest", "pyright", "ruff"]

[tool.setuptools]
packages = ["qtqp.signals"]

[tool.setuptools.package-dir]
"qtqp.signals" = "src"

[tool.pyright]
include = ["src"]
pythonPath = "../../.venv/bin/python"
pythonVersion = "3.14"
typeCheckingMode = "strict"

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]
