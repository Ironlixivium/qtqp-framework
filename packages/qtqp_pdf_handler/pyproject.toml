[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "pdf_viewer_editor_qt"
version = "0.1.0"
requires-python = ">=3.14"

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests", "pdf_viewer_editor_qt"]

[tool.black]
line-length = 120
target-version = ["py313"]

[tool.ruff]
line-length = 120
target-version = "py314"
lint.select = ["E","F","I","UP","B","C90"]
lint.ignore = []

[tool.pylance]
include = ["pdf_viewer_editor_qt"]
executionEnvironments = [
    { root = "pdf_viewer_editor_qt" }
]
pythonpath = "~/Projects/pdf_viewer_editor_qt/.venv/bin/python"
pythonPlatform = "Linux"
reportMissingImports = true
reportMissingModuleSource = true
typeCheckingMode = "strict"
